<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <link href="style.css" rel="stylesheet">
        <title>Activités hebdomadères GMET</title>
        <script src="code.js"></script>
    </head>

    <body>
        <header>
        </header>

        <!-- navigation principale avec date et liens -->
        <nav>
            <div class="TableauTitrePage"> 
                <!-- numéro de semaine calculé dynamiquement -->
                <div>
                    <h2 id="WeekNumber" class="CommunTitre"></h2>
                    <h2>Jour : <input type="date" id="Start" name="DateDuJour" min="2026-01-01" max="2033-12-31"></h2>
                </div>    

                <!-- titre central de la page -->
                <div> <h1 class="TexteCentré"> Activités hebdomadères GMET </h1></div>

                <!-- liens de navigation secondaires -->
                <div>
                    <a class="Lien TexteDroite" href="Paramètres.html"> Connexion</a>
                    <br>
                    <a class="Lien TexteDroite" href="Paramètres.html"> Paramètres</a>
                </div>
            </div>
        </nav>

        <main>
            <section class="BordureRouge">
                <header class="TitreSection">
                        <div> <img src="Images/AgendaRéduit.png" alt="Icone agenda" /> </div>
                        <div> <h1 class="CommunTitre TexteRouge">  Activité du jour</h1> </div>
                </header>

                <section>
                    Texte 1 <br>
                    <!-- Niveau d'importance du texte auquel on peut changer le style par le CSS
                    <strong>Texte en gras</strong>
                    <mark>Texte surligné</mark>
                    <em>Texte italique</em> -->
                    <ul>
                        <li>Liste à puce</li>
                    </ul>
                    <ol>
                        <li>Liste numérotée</li>
                    </ol>
                </section>
            </section>

            <section class="BordureVerte">
                <header class="TitreSection">
                    <div> <img src="Images/Semaine.png" alt="Icone semaine" /></div>
                    <div> <h1 class="CommunTitre TexteVert">  Activité de la semaine</h1> </div>
                </header>
                
                <section>
                    Texte 1 <br>
                    Texte 2
                </section>
            </section>
        </main>
    </body>
</html>
